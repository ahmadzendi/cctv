<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard CCTV Bojonegoro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        .loader {
            border: 3px solid rgba(59, 130, 246, 0.1);
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .dark .leaflet-layer,
        .dark .leaflet-control-zoom-in,
        .dark .leaflet-control-zoom-out,
        .dark .leaflet-control-attribution {
            filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
        }

        .leaflet-tooltip {
            background: #ffffff;
            color: #0f172a;
            border: none;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            font-weight: 600;
            padding: 6px 12px;
        }
        .dark .leaflet-tooltip {
            background: #1e293b;
            color: #f8fafc;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .dark .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .cctv-card-hover {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .cctv-card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        .dark .cctv-card-hover:hover {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 0 20px -5px rgba(59, 130, 246, 0.3);
            border-color: #3b82f6;
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#0b1120] dark:text-slate-200 min-h-screen transition-colors duration-300">

    <header class="glass-panel z-40 relative">
        <div class="container mx-auto px-4 sm:px-6 py-5 flex flex-col sm:flex-row justify-between items-center gap-5">
            <div class="flex items-center gap-4">
                <div class="relative flex items-center justify-center w-12 h-12 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl shadow-lg shadow-blue-500/30">
                    <span class="absolute w-3 h-3 bg-white rounded-full animate-ping opacity-80"></span>
                    <span class="relative w-3 h-3 bg-white rounded-full"></span>
                </div>
                <div>
                    <h1 class="text-2xl font-extrabold tracking-tight text-slate-900 dark:text-white">Bojonegoro<span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-500 dark:from-blue-400 dark:to-indigo-400"> CCTV</span></h1>
                    <p class="text-slate-500 dark:text-slate-400 text-xs font-medium mt-0.5 tracking-wider uppercase">Live Monitoring System</p>
                </div>
            </div>
            <div class="flex items-center gap-3 sm:gap-4 w-full sm:w-auto justify-between sm:justify-end">
                <div class="flex items-center gap-3 text-sm bg-white dark:bg-slate-800/80 border border-slate-200 dark:border-slate-700 px-5 py-2.5 rounded-2xl shadow-sm">
                    <span id="api-status" class="flex items-center gap-2 font-semibold text-emerald-600 dark:text-emerald-400">
                        <span class="relative flex h-2.5 w-2.5">
                          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                          <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500"></span>
                        </span>
                        Online
                    </span>
                    <div class="w-px h-4 bg-slate-300 dark:bg-slate-600 mx-1"></div>
                    <span class="text-slate-600 dark:text-slate-300 font-medium">Total: <span id="cctv-count" class="font-bold text-slate-900 dark:text-white text-base ml-1">0</span></span>
                </div>
                <button id="theme-toggle" class="p-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 shadow-sm transition-all hover:scale-105 active:scale-95">
                    <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                    <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" fill-rule="evenodd" clip-rule="evenodd"></path></svg>
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 sm:px-6 py-8">
        
        <section class="mb-14 fade-in">
            <div class="flex items-center gap-3 mb-5">
                <div class="p-2 bg-blue-100 dark:bg-blue-900/40 rounded-lg text-blue-600 dark:text-blue-400">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>
                </div>
                <h2 class="text-xl font-bold text-slate-900 dark:text-white">Peta Lokasi</h2>
            </div>
            <div class="p-2 bg-white dark:bg-slate-800/50 rounded-[2rem] shadow-xl border border-slate-200 dark:border-slate-700/50">
                <div id="map" class="w-full h-[400px] sm:h-[500px] rounded-[1.5rem] z-0 relative bg-slate-100 dark:bg-slate-900 overflow-hidden"></div>
            </div>
        </section>

        <div id="loading" class="flex flex-col items-center justify-center py-20">
            <div class="loader mb-6"></div>
            <p class="text-slate-500 dark:text-slate-400 font-medium animate-pulse">Menyiapkan data CCTV realtime...</p>
        </div>

        <section id="grid-section" class="hidden fade-in" style="animation-delay: 0.1s;">
            <div class="flex flex-col md:flex-row md:items-end justify-between mb-6 gap-4 border-b border-slate-200 dark:border-slate-800 pb-4">
                <div class="flex items-center gap-3">
                    <div class="p-2 bg-indigo-100 dark:bg-indigo-900/40 rounded-lg text-indigo-600 dark:text-indigo-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    </div>
                    <h2 class="text-xl font-bold text-slate-900 dark:text-white">Daftar Titik Pantau</h2>
                </div>
                
                <div class="relative w-full md:w-80">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                    <input type="text" id="search-input" class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 dark:border-slate-700 rounded-xl leading-5 bg-white dark:bg-slate-800 text-slate-900 dark:text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm transition-colors" placeholder="Cari lokasi CCTV...">
                </div>
            </div>
            
            <div id="no-results" class="hidden py-10 text-center">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-slate-100 dark:bg-slate-800 mb-4">
                    <svg class="w-8 h-8 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
                <p class="text-slate-500 dark:text-slate-400 font-medium">Lokasi tidak ditemukan.</p>
            </div>

            <div id="cctv-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-5 auto-rows-max">
            </div>
        </section>

    </main>

    <div id="video-modal" class="fixed inset-0 z-[100] flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="absolute inset-0 bg-slate-900/80 dark:bg-[#050810]/90 backdrop-blur-lg" onclick="closeModal()"></div>
        
        <div id="modal-content" class="relative w-full max-w-5xl mx-4 bg-white dark:bg-slate-900 rounded-[2rem] overflow-hidden shadow-2xl border border-slate-200 dark:border-slate-700 transform scale-95 transition-all duration-300 flex flex-col">
            
            <div class="absolute top-0 left-0 right-0 z-10 flex justify-between items-start p-5 bg-gradient-to-b from-black/80 via-black/40 to-transparent pointer-events-none">
                <div class="pointer-events-auto">
                    <div class="flex items-center gap-2 mb-1.5">
                        <span class="px-2.5 py-1 rounded-md bg-rose-500 text-white text-[10px] font-bold tracking-wider flex items-center gap-1.5 shadow-lg">
                            <span class="w-1.5 h-1.5 bg-white rounded-full animate-pulse"></span> LIVE
                        </span>
                        <p id="modal-category" class="text-slate-200 text-xs font-semibold drop-shadow-md bg-black/30 px-2 py-1 rounded-md backdrop-blur-sm"></p>
                    </div>
                    <h3 id="modal-title" class="text-white font-bold text-xl drop-shadow-lg"></h3>
                </div>
                <button onclick="closeModal()" class="pointer-events-auto text-white/80 hover:text-white bg-black/40 hover:bg-rose-500 backdrop-blur-md rounded-xl p-2.5 transition-all duration-200">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="w-full aspect-video bg-black flex items-center justify-center relative">
                <div id="modal-loader" class="absolute flex flex-col items-center">
                    <div class="loader border-blue-500 border-t-white"></div>
                    <span class="text-white/70 text-sm mt-3 font-medium">Memuat stream...</span>
                </div>
                <video id="modal-video" class="w-full h-full object-contain relative z-0" controls playsinline></video>
            </div>
        </div>
    </div>

    <script>
        const themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
        const themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');
        const themeToggleBtn = document.getElementById('theme-toggle');

        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            themeToggleLightIcon.classList.remove('hidden');
        } else {
            document.documentElement.classList.remove('dark');
            themeToggleDarkIcon.classList.remove('hidden');
        }

        themeToggleBtn.addEventListener('click', function() {
            themeToggleDarkIcon.classList.toggle('hidden');
            themeToggleLightIcon.classList.toggle('hidden');

            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('color-theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('color-theme', 'dark');
            }
        });

        const API_URL = 'https://api.allorigins.win/raw?url=' + encodeURIComponent('https://data.bojonegorokab.go.id/api/botic/botic/cctv');
        
        const container = document.getElementById('cctv-container');
        const loading = document.getElementById('loading');
        const gridSection = document.getElementById('grid-section');
        const cctvCount = document.getElementById('cctv-count');
        const apiStatus = document.getElementById('api-status');
        const searchInput = document.getElementById('search-input');
        const noResults = document.getElementById('no-results');
        
        const modal = document.getElementById('video-modal');
        const modalContent = document.getElementById('modal-content');
        const modalVideo = document.getElementById('modal-video');
        const modalTitle = document.getElementById('modal-title');
        const modalCategory = document.getElementById('modal-category');
        const modalLoader = document.getElementById('modal-loader');
        
        let modalHls = null;
        let globalCCTVData = [];

        const map = L.map('map').setView([-7.1509, 111.8817], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        const thumbImages = [
            'https://images.unsplash.com/photo-1515162816999-a0c47dc192f7?auto=format&fit=crop&q=80&w=400',
            'https://images.unsplash.com/photo-1554223069-7ee67275e586?auto=format&fit=crop&q=80&w=400',
            'https://images.unsplash.com/photo-1494522855154-9297ac14b55f?auto=format&fit=crop&q=80&w=400',
            'https://images.unsplash.com/photo-1520106212299-d99c443e4568?auto=format&fit=crop&q=80&w=400',
            'https://images.unsplash.com/photo-1623065116744-8846c4f9bc20?auto=format&fit=crop&q=80&w=400',
            'https://images.unsplash.com/photo-1568605117036-5fe5e7bab0b7?auto=format&fit=crop&q=80&w=400'
        ];

        async function fetchCCTVData() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Network error');
                
                const data = await response.json();
                globalCCTVData = data.data || data; 
                
                loading.classList.add('hidden');
                gridSection.classList.remove('hidden');
                cctvCount.innerText = globalCCTVData.length;
                
                renderMap();
                renderGrid(globalCCTVData);
            } catch (error) {
                loading.classList.add('hidden');
                apiStatus.innerHTML = `<span class="w-2.5 h-2.5 bg-rose-500 rounded-full"></span> Offline`;
                apiStatus.className = "flex items-center gap-2 font-semibold text-rose-500";
                
                gridSection.classList.remove('hidden');
                container.innerHTML = `
                    <div class="col-span-full p-8 bg-white dark:bg-slate-800 rounded-2xl border border-rose-200 dark:border-rose-900/50 shadow-sm text-center">
                        <div class="w-16 h-16 bg-rose-100 dark:bg-rose-900/30 rounded-full flex items-center justify-center mx-auto mb-4">
                            <svg class="w-8 h-8 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        </div>
                        <h3 class="text-lg font-bold text-slate-900 dark:text-white mb-1">Gagal Terhubung</h3>
                        <p class="text-slate-500 dark:text-slate-400">Tidak dapat mengambil data dari server. Silakan coba beberapa saat lagi.</p>
                    </div>`;
            }
        }

        function renderMap() {
            globalCCTVData.forEach((cctv, index) => {
                const lat = parseFloat(cctv.long); 
                const lng = parseFloat(cctv.lat);
                
                if (!isNaN(lat) && !isNaN(lng)) {
                    const marker = L.marker([lat, lng]).addTo(map);
                    
                    marker.bindTooltip(cctv.lokasi || 'Lokasi CCTV', {
                        direction: 'top',
                        offset: [0, -10],
                        opacity: 0.95
                    });
                    
                    marker.on('click', () => openModalFromIndex(index));
                }
            });
        }

        function renderGrid(dataToRender) {
            container.innerHTML = '';
            
            if (dataToRender.length === 0) {
                noResults.classList.remove('hidden');
                container.classList.add('hidden');
                return;
            } else {
                noResults.classList.add('hidden');
                container.classList.remove('hidden');
            }

            let htmlString = '';

            dataToRender.forEach((cctv) => {
                const originalIndex = globalCCTVData.indexOf(cctv);
                const bgImage = thumbImages[originalIndex % thumbImages.length];

                htmlString += `
                    <div data-index="${originalIndex}" class="cctv-card-hover bg-white dark:bg-slate-800 rounded-2xl overflow-hidden border border-slate-200 dark:border-slate-700 shadow-sm cursor-pointer flex flex-col relative group h-full">
                        <div class="relative w-full aspect-video bg-slate-900 flex items-center justify-center overflow-hidden">
                            
                            <img src="${bgImage}" class="absolute inset-0 w-full h-full object-cover opacity-70 group-hover:opacity-40 transition-opacity duration-500 group-hover:scale-105 transform z-0" loading="lazy" alt="CCTV Thumbnail">
                            
                            <div class="absolute inset-0 bg-gradient-to-t from-slate-900/90 via-slate-900/20 to-transparent z-10"></div>
                            
                            <div class="absolute inset-0 flex flex-col items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300 z-20">
                                <div class="bg-blue-600/90 backdrop-blur-sm text-white text-xs px-4 py-2 rounded-xl font-bold flex items-center gap-2 shadow-lg shadow-blue-500/30 transform translate-y-2 group-hover:translate-y-0 transition-all duration-300">
                                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> PUTAR LIVE
                                </div>
                            </div>
                        </div>
                        <div class="p-4 flex-1 flex flex-col justify-between bg-white dark:bg-slate-800 relative z-10 border-t border-slate-100 dark:border-slate-700/50">
                            <h3 class="text-sm font-bold text-slate-900 dark:text-white line-clamp-2 mb-3 leading-snug group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">${cctv.lokasi}</h3>
                            <div class="mt-auto">
                                <span class="inline-block text-[10px] font-semibold bg-slate-100 dark:bg-slate-900/80 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-400 px-2.5 py-1 rounded-md">
                                    ${cctv.kategori || 'CCTV Publik'}
                                </span>
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = htmlString;
        }

        container.addEventListener('click', function(e) {
            const card = e.target.closest('.cctv-card-hover');
            if (card) {
                const index = card.getAttribute('data-index');
                openModalFromIndex(index);
            }
        });

        searchInput.addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            const filteredData = globalCCTVData.filter(cctv => 
                (cctv.lokasi && cctv.lokasi.toLowerCase().includes(searchTerm)) ||
                (cctv.kategori && cctv.kategori.toLowerCase().includes(searchTerm))
            );
            renderGrid(filteredData);
        });

        window.openModalFromIndex = function(index) {
            const cctv = globalCCTVData[index];
            if(cctv) openModalFromObj(cctv);
        }

        function openModalFromObj(cctv) {
            modalTitle.innerText = cctv.lokasi || 'Lokasi Tidak Diketahui';
            modalCategory.innerText = cctv.kategori || 'CCTV';
            modalLoader.classList.remove('hidden');
            
            modal.classList.remove('hidden');
            void modal.offsetWidth;
            modal.classList.remove('opacity-0');
            modalContent.classList.remove('scale-95');
            document.body.style.overflow = 'hidden';

            if (Hls.isSupported()) {
                if(modalHls) modalHls.destroy();
                modalHls = new Hls({ lowLatencyMode: true });
                modalHls.loadSource(cctv.url);
                modalHls.attachMedia(modalVideo);
                
                modalHls.on(Hls.Events.MANIFEST_PARSED, function() {
                    modalLoader.classList.add('hidden');
                    modalVideo.play();
                });
                modalHls.on(Hls.Events.ERROR, function(event, data) {
                    if (data.fatal) {
                        modalLoader.innerHTML = '<span class="text-rose-500 font-semibold bg-rose-500/10 px-4 py-2 rounded-lg">Gagal memuat stream video.</span>';
                    }
                });
            } else if (modalVideo.canPlayType('application/vnd.apple.mpegurl')) {
                modalVideo.src = cctv.url;
                modalVideo.addEventListener('loadedmetadata', function() {
                    modalLoader.classList.add('hidden');
                    modalVideo.play();
                });
            }
        }

        function closeModal() {
            modal.classList.add('opacity-0');
            modalContent.classList.add('scale-95');
            document.body.style.overflow = 'auto';
            
            setTimeout(() => {
                modal.classList.add('hidden');
                
                if(modalHls) {
                    modalHls.destroy();
                    modalHls = null;
                }
                modalVideo.pause();
                modalVideo.removeAttribute('src');
                modalVideo.load();
                
                modalLoader.innerHTML = `
                    <div class="loader border-blue-500 border-t-white"></div>
                    <span class="text-white/70 text-sm mt-3 font-medium">Memuat stream...</span>`;
            }, 300);
        }

        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape" && !modal.classList.contains('hidden')) {
                closeModal();
            }
        });

        fetchCCTVData();
    </script>
</body>
</html>
