<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live CCTV Bojonegoro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader {
            border: 4px solid #374151;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .cctv-frame {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            background-color: #000;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen">
    <header class="bg-gray-800 shadow-md border-b border-gray-700">
        <div class="container mx-auto px-4 py-6 text-center">
            <h1 class="text-3xl font-bold tracking-tight text-white flex items-center justify-center gap-3">
                <span class="w-3 h-3 bg-red-500 rounded-full animate-pulse"></span>
                Pantauan Live CCTV Bojonegoro
            </h1>
            <p class="text-gray-400 mt-2 text-sm">Real-time monitoring lalu lintas dan fasilitas umum</p>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <div id="loading" class="flex flex-col items-center justify-center py-20">
            <div class="loader mb-4"></div>
            <p class="text-gray-400">Mengambil data CCTV...</p>
        </div>

        <div id="error-message" class="hidden bg-red-900/50 border border-red-500 text-red-200 px-4 py-3 rounded-lg text-center max-w-2xl mx-auto">
            Gagal memuat data. Mungkin ada masalah jaringan atau blokir CORS dari server API.
        </div>

        <div id="cctv-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 hidden">
        </div>
    </main>

    <script>
        const API_URL = 'https://api.allorigins.win/raw?url=' + encodeURIComponent('https://data.bojonegorokab.go.id/api/botic/botic/cctv');
        const container = document.getElementById('cctv-container');
        const loading = document.getElementById('loading');
        const errorMessage = document.getElementById('error-message');

        async function fetchCCTVData() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Network response was not ok');
                
                const result = await response.json();
                const data = result.data || result; 

                renderCCTV(data);
            } catch (error) {
                loading.classList.add('hidden');
                errorMessage.classList.remove('hidden');
            }
        }

        function renderCCTV(cctvList) {
            loading.classList.add('hidden');
            container.classList.remove('hidden');

            if (!cctvList || cctvList.length === 0) {
                container.innerHTML = `<p class="text-center col-span-full text-gray-400">Tidak ada data CCTV yang tersedia saat ini.</p>`;
                return;
            }

            cctvList.forEach(cctv => {
                const namaLokasi = cctv.nama_lokasi || cctv.name || cctv.lokasi || 'Lokasi Tidak Diketahui';
                const urlStream = cctv.url_stream || cctv.url || cctv.link || '';

                const card = document.createElement('div');
                card.className = 'bg-gray-800 rounded-xl overflow-hidden shadow-lg hover:shadow-2xl transition-all duration-300 border border-gray-700 hover:border-blue-500 group';

                card.innerHTML = `
                    <div class="relative overflow-hidden">
                        <iframe src="${urlStream}" class="cctv-frame transform group-hover:scale-105 transition-transform duration-500" allowfullscreen loading="lazy"></iframe>
                        <div class="absolute top-2 right-2 bg-black/60 text-white text-xs px-2 py-1 rounded backdrop-blur-sm flex items-center gap-1">
                            <span class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span> LIVE
                        </div>
                    </div>
                    <div class="p-4">
                        <h3 class="font-semibold text-lg text-gray-100 truncate" title="${namaLokasi}">${namaLokasi}</h3>
                        <p class="text-gray-400 text-sm mt-1 truncate">Bojonegoro, Jawa Timur</p>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        fetchCCTVData();
    </script>
</body>
</html>
